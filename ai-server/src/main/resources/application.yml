server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: ai-server
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:ai_psychological_assistant}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:ai_user}
    password: ${DB_PASSWORD:change_me}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-at-least-32-characters}
    expire-hours: ${JWT_EXPIRE_HOURS:24}
  file:
    upload-dir: ${UPLOAD_DIR:uploads}
    public-prefix: /uploads
